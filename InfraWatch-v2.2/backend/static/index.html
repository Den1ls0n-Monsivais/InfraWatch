<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InfraWatch v2 — IT Monitor</title>
<link rel="stylesheet" href="/static/css/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <span class="logo-icon">🛡</span>
      <h1>InfraWatch</h1>
      <p>IT Infrastructure Monitor v2.0</p>
    </div>
    <div class="form-group">
      <label>Usuario</label>
      <input id="l-user" type="text" value="admin" placeholder="admin"/>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input id="l-pass" type="password" value="infrawatch" placeholder="••••••••"
             onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Iniciar Sesión</button>
    <p id="login-err" class="login-err"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="logo-icon">🛡</span>
      <span class="brand-text">InfraWatch</span>
    </div>
    <ul class="nav-menu">
      <li><a href="#" class="nav-link active" data-view="dashboard">
        <span class="nav-icon">📊</span><span>Dashboard</span></a></li>
      <li><a href="#" class="nav-link" data-view="inventory">
        <span class="nav-icon">🖥</span><span>Inventario</span></a></li>
      <li><a href="#" class="nav-link" data-view="assets">
        <span class="nav-icon">📦</span><span>Activos Fijos</span>
        <span id="badge-pending" class="badge-nav" style="display:none"></span></a></li>
      <li><a href="#" class="nav-link" data-view="personnel">
        <span class="nav-icon">👥</span><span>Personal</span></a></li>
      <li><a href="#" class="nav-link" data-view="maintenance">
        <span class="nav-icon">🔧</span><span>Mantenimientos</span></a></li>
      <li><a href="#" class="nav-link" data-view="alerts">
        <span class="nav-icon">🔔</span><span>Alertas <span id="alert-badge" class="badge"></span></span></a></li>
      <li id="nav-users-li" style="display:none"><a href="#" class="nav-link" data-view="users">
        <span class="nav-icon">👤</span><span>Usuarios</span></a></li>
      <li id="nav-config-li" style="display:none"><a href="#" class="nav-link" data-view="config">
        <span class="nav-icon">⚙</span><span>Configuración</span></a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="user-info">
        <span id="sidebar-user">admin</span>
        <span id="sidebar-role" class="role-badge">admin</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </nav>

  <main class="main-content">
    <div id="view-dashboard"    class="view active"></div>
    <div id="view-inventory"    class="view"></div>
    <div id="view-assets"       class="view"></div>
    <div id="view-personnel"    class="view"></div>
    <div id="view-maintenance"  class="view"></div>
    <div id="view-alerts"       class="view"></div>
    <div id="view-users"        class="view"></div>
    <div id="view-config"       class="view"></div>
    <div id="view-agent-detail" class="view"></div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/js/app.js"></script>
</body>
</html>
